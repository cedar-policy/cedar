# Reusable workflow for validating Cedar crate releases.
# Checks the branch, tag format, and crate version.
name: Validate release (reusable)
on:
    workflow_call:
        inputs:
            tag:
                required: true
                type: string
                description: "The GitHub tag to be released."
            tag_prefix:
                required: true
                type: string
                description: "Prefix before the semver in the tag (e.g., 'v' or 'cedar-policy-symcc-v')."
            version_toml_path:
                required: true
                type: string
                description: "Path to the Cargo.toml containing the version (e.g., 'Cargo.toml')."
            version_toml_key:
                required: true
                type: string
                description: "TOML key for the version (e.g., 'workspace.package.version' or 'package.version')."
# Declare default permissions as read only.
permissions: read-all
jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Validate branch
              if: github.ref != 'refs/heads/main'
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              with:
                script: core.setFailed('This workflow must be triggered from the "main" branch.')
            - name: Validate tag
              run: |
                REGEX_PATTERN="^${TAG_PREFIX}[0-9]+\.[0-9]+\.[0-9]+$"
                if [[ ! "$TAG_NAME" =~ $REGEX_PATTERN ]]; then
                    echo "Specified tag must match $REGEX_PATTERN"
                    exit 1
                fi
              env:
                TAG_NAME: ${{ inputs.tag }}
                TAG_PREFIX: ${{ inputs.tag_prefix }}
            - name: Checkout tag
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                ref: refs/tags/${{ inputs.tag }}
            - name: Configure rust toolchain
              run: rustup update stable && rustup default stable
            - name: Install toml-cli
              run: cargo install toml-cli --locked
            - name: Validate version
              run: test "${TAG_PREFIX}$(toml get --raw "$VERSION_TOML_PATH" "$VERSION_TOML_KEY")" = "$TAG_NAME"
              env:
                TAG_NAME: ${{ inputs.tag }}
                TAG_PREFIX: ${{ inputs.tag_prefix }}
                VERSION_TOML_PATH: ${{ inputs.version_toml_path }}
                VERSION_TOML_KEY: ${{ inputs.version_toml_key }}
